  <script>
    // Data anggota tubuh
    const bodyParts = [
        { id:'mata', indo:'Mata', lampung:'Mata', emoji:'👁️' },
        { id:'hidung', indo:'Hidung', lampung:'Irung', emoji:'👃' },
        { id:'mulut', indo:'Mulut', lampung:'Cunguk', emoji:'👄' },
        { id:'telinga', indo:'Telinga', lampung:'Cuping', emoji:'👂' },
        { id:'tangan', indo:'Tangan', lampung:'Tangan', emoji:'✋' },
        { id:'kaki', indo:'Kaki', lampung:'Kukut', emoji:'🦶' },
        { id:'kepala', indo:'Kepala', lampung:'Hulu', emoji:'🧠' },
        { id:'rambut', indo:'Rambut', lampung:'Buok', emoji:'💇' },
    ];

    let studentName = '';
    let studentClass = '';

    // Identity form
    document.getElementById('identity-form').addEventListener('submit', function(e) {
        e.preventDefault();
        studentName = document.getElementById('input-nama').value.trim();
        studentClass = document.getElementById('input-kelas').value.trim();
        document.getElementById('greeting-text').textContent = `Halo, ${studentName}! (Kelas ${studentClass})`;
        showPage('menu');
    });

    function showPage(name) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + name).classList.add('active');
        if (name === 'materi') renderMateri();
        if (name === 'latihan') renderLatihan();
        if (name === 'kuis') renderKuis();
        if (name === 'permainan') renderPermainan();
    }

    // Materi
    function renderMateri() {
        const grid = document.getElementById('materi-grid');
        grid.innerHTML = bodyParts.map(b => `
            <div class="bg-white rounded-xl p-4 shadow text-center">
                <div class="text-4xl mb-2">${b.emoji}</div>
                <div class="font-bold text-gray-800">${b.indo}</div>
                <div class="text-sm text-purple-600 font-medium">${b.lampung}</div>
            </div>
        `).join('');
    }

    // Latihan - matching
    function renderLatihan() {
        const container = document.getElementById('latihan-content');
        const shuffled = [...bodyParts].sort(() => Math.random() - 0.5).slice(0, 5);
        const answers = [...shuffled].sort(() => Math.random() - 0.5);
        let matched = 0;
        let selected = null;

        container.innerHTML = `
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-3" id="lat-left"></div>
                <div class="space-y-3" id="lat-right"></div>
            </div>
            <div id="lat-feedback" class="text-center mt-4 font-bold"></div>
        `;

        const left = container.querySelector('#lat-left');
        const right = container.querySelector('#lat-right');

        shuffled.forEach((b, i) => {
            left.innerHTML += `<button class="w-full bg-amber-50 border-2 border-amber-200 rounded-lg p-3 font-medium text-left option-btn" data-id="${b.id}" data-side="left">${b.emoji} ${b.indo}</button>`;
        });
        answers.forEach((b, i) => {
            right.innerHTML += `<button class="w-full bg-blue-50 border-2 border-blue-200 rounded-lg p-3 font-medium text-left option-btn" data-id="${b.id}" data-side="right">${b.lampung}</button>`;
        });

        container.addEventListener('click', function(e) {
            const btn = e.target.closest('[data-id]');
            if (!btn || btn.disabled) return;
            if (!selected) {
                selected = btn;
                btn.classList.add('ring-2','ring-blue-500');
            } else {
                if (selected.dataset.side === btn.dataset.side) {
                    selected.classList.remove('ring-2','ring-blue-500');
                    selected = btn;
                    btn.classList.add('ring-2','ring-blue-500');
                    return;
                }
                if (selected.dataset.id === btn.dataset.id) {
                    selected.classList.add('correct'); btn.classList.add('correct');
                    selected.disabled = true; btn.disabled = true;
                    matched++;
                    if (matched === shuffled.length) {
                        document.getElementById('lat-feedback').textContent = '🎉 Hebat! Semua benar!';
                    }
                } else {
                    selected.classList.add('wrong'); btn.classList.add('wrong');
                    setTimeout(() => { selected.classList.remove('wrong','ring-2','ring-blue-500'); btn.classList.remove('wrong'); }, 600);
                }
                selected.classList.remove('ring-2','ring-blue-500');
                selected = null;
            }
        });
    }

    // Kuis
    let kuisData, kuisIdx, kuisScore;
    function renderKuis() {
        kuisData = [...bodyParts].sort(() => Math.random() - 0.5).slice(0, 5);
        kuisIdx = 0; kuisScore = 0;
        document.getElementById('kuis-result').classList.add('hidden');
        showKuisQuestion();
    }
    function showKuisQuestion() {
        const container = document.getElementById('kuis-content');
        if (kuisIdx >= kuisData.length) {
            container.innerHTML = '';
            const res = document.getElementById('kuis-result');
            res.classList.remove('hidden');
            res.innerHTML = `<div class="text-5xl mb-3">🏆</div><p class="text-xl font-bold">Skor: ${kuisScore}/${kuisData.length}</p><p class="mt-2">${kuisScore >= 4 ? 'Luar biasa!' : kuisScore >= 3 ? 'Bagus!' : 'Ayo belajar lagi!'}</p>`;
            return;
        }
        const q = kuisData[kuisIdx];
        const options = [q.lampung];
        while (options.length < 3) {
            const r = bodyParts[Math.floor(Math.random() * bodyParts.length)].lampung;
            if (!options.includes(r)) options.push(r);
        }
        options.sort(() => Math.random() - 0.5);
        container.innerHTML = `
            <div class="bg-white rounded-xl p-6 shadow text-center">
                <div class="text-5xl mb-3">${q.emoji}</div>
                <p class="font-bold mb-1">Soal ${kuisIdx+1}/${kuisData.length}</p>
                <p class="mb-4">Apa bahasa Lampung dari <strong>"${q.indo}"</strong>?</p>
                <div class="space-y-3">${options.map(o => `<button class="option-btn w-full bg-gray-100 border-2 border-gray-200 rounded-lg p-3 font-medium" onclick="answerKuis(this,'${o}','${q.lampung}')">${o}</button>`).join('')}</div>
            </div>
        `;
    }
    function answerKuis(btn, ans, correct) {
        const btns = btn.parentElement.querySelectorAll('button');
        btns.forEach(b => b.disabled = true);
        if (ans === correct) { btn.classList.add('correct'); kuisScore++; }
        else { btn.classList.add('wrong'); btns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); }); }
        setTimeout(() => { kuisIdx++; showKuisQuestion(); }, 1000);
    }

    // Permainan - Tebak emoji
    let gameScore, gameRound, gameData;
    function renderPermainan() {
        gameData = [...bodyParts].sort(() => Math.random() - 0.5);
        gameScore = 0; gameRound = 0;
        showGameRound();
    }
    function showGameRound() {
        const container = document.getElementById('permainan-content');
        if (gameRound >= 5) {
            container.innerHTML = `<div class="text-5xl mb-3">🎊</div><p class="text-xl font-bold">Skor: ${gameScore}/5</p><p class="mt-2">${gameScore>=4?'Keren sekali!':'Ayo coba lagi!'}</p><button onclick="renderPermainan()" class="mt-4 bg-pink-500 text-white px-6 py-2 rounded-lg font-bold">Main Lagi</button>`;
            return;
        }
        const target = gameData[gameRound];
        const emojis = [target];
        while (emojis.length < 4) {
            const r = bodyParts[Math.floor(Math.random() * bodyParts.length)];
            if (!emojis.find(e => e.id === r.id)) emojis.push(r);
        }
        emojis.sort(() => Math.random() - 0.5);
        container.innerHTML = `
            <p class="text-lg font-bold mb-4">Temukan: <span class="text-purple-600">"${target.lampung}"</span></p>
            <div class="grid grid-cols-2 gap-4">${emojis.map(e => `<button class="text-5xl bg-white rounded-xl p-6 shadow hover:scale-110 transition-transform" onclick="answerGame(this,'${e.id}','${target.id}')">${e.emoji}</button>`).join('')}</div>
            <p class="mt-3 text-gray-500">Ronde ${gameRound+1}/5</p>
        `;
    }
    function answerGame(btn, ans, correct) {
        const btns = btn.parentElement.querySelectorAll('button');
        btns.forEach(b => b.disabled = true);
        if (ans === correct) { btn.classList.add('bounce'); gameScore++; }
        else { btn.style.opacity = '0.4'; btns.forEach(b => { if (b.getAttribute('onclick').includes(correct)) b.classList.add('bounce'); }); }
        setTimeout(() => { gameRound++; showGameRound(); }, 800);
    }

    // Refleksi
    function selectRefleksi(btn, emoji) {
        const res = document.getElementById('refleksi-result');
        res.classList.remove('hidden');
        const messages = { '😊': 'Senang kamu sudah paham! Terus belajar ya!', '😐': 'Tidak apa-apa, ayo ulangi materinya!', '😢': 'Jangan sedih, kamu pasti bisa! Coba lagi ya!' };
        res.innerHTML = `<div class="text-4xl mb-2">${emoji}</div><p class="font-medium">${messages[emoji]}</p>`;
        document.querySelectorAll('#refleksi-emojis button').forEach(b => b.style.opacity = '0.4');
        btn.style.opacity = '1';
    }
</script>
